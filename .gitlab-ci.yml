variables:
  TWINE_USERNAME: gitlab-ci-token
  TWINE_PASSWORD: $CI_JOB_TOKEN
  REPOSITORY_URL: $CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/pypi

linux:
  image: python:3.12
  tags:
    # Use pinocchio
    - pinocchio-docker
    # Allocate large shared (4xCPU 8GB)
    #- ci.inria.fr
    #- large
  before_script:
    - curl -sSL https://get.docker.com/ | sh
    - env
    - pip list
  stage: build
  rules:
    - if: $CI_COMMIT_TAG =~ /^tvm-v/
  script:
    - python -m pip install -r requirements.txt
    - ./checkout-tvm.sh
    - ./build-wheels.sh
    - twine upload --repository-url $REPOSITORY_URL --skip-existing wheelhouse/*.whl
  artifacts:
    paths:
      - wheelhouse/

macos:
  tags:
    - macos-baremetal-applem4
  variables:
    BUILD_PLATFORM: "darwin"
  stage: build
  rules:
    - if: $CI_COMMIT_TAG =~ /^tvm-v/
  script:
    - python3.12 -m pip install -r requirements.txt
    - ./checkout-tvm.sh
    - ./build-wheels.sh
    - twine upload --repository-url $REPOSITORY_URL --skip-existing wheelhouse/*.whl
  artifacts:
    paths:
      - wheelhouse/
